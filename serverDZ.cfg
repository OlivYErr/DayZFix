hostname = "NICKAAA"; // Server name
password = "";
                // Password to connect to the
                // server
passwordAdmin = "GS22";
                // Password to become a server
                // admin

description = "";
                // Description of the server.
                // Gets displayed to users in client server browser.

enableWhitelist = 0;
                // Enable/disable whitelist (value
                // 0-1)

maxPlayers = 1;
                // Maximum amount of players

verifySignatures = 2;
                // Verifies .pbos against .bisign
                // files. (only 2 is supported)
                // usec launcher
forceSameBuild = 1;
                // When enabled, the server will
                // allow the connection only for clients with same .exe
                // revision as the server

disableVoN = 0;
                // Enable/disable voice over
                // network (value 0-1)
vonCodecQuality = 20;
                // Voice over network codec
                // quality, the higher, the better (value 0-30)
vhalBty; // 0 higher; 1 disabled

shardId = "123abc";
                // Six alphanumeric characters
                // for Private server

disable3rdPerson=0;
                // Toggles the 3rd person view for
                // players (value 0-1)
disableCrosshair=1;
                // Toggles the cross-hair (value
                // 0-1)

disablePersonalLight = 0;
                // Disables personal light for all
                // clients connected to server
lightingConfig = 1;
                // 0 for brighter night setup, 1
                // for darker night setup

serverTime="SystemTime";
                // Initial in-game time of the
                // server. "SystemTime" means the local time of the machine.
                // Also possibility to set the time value in
                // "YYYY/MM/DD/HH:MM" format, f.e. "2015/4/8/17/23" .
serverTimeAcceleration=1;
                // Accelerated Time (value 0-24)//
                // This is a time multiplier for in-game time. In this case, time would move 24 times faster as normal, so an entire day
                // would pass in one hour.
serverNightTimeAcceleration=1;
                // Accelerated Nigh Time - The
                // numerical value being a multiplier (0.1-64) and also
                // multiplied by serverTimeAcceleration value. In case it
                // is set to 4 and serverTimeAcceleration is set to 2, night time
                // would move 8 times faster as normal. An entire night would
                // pass in 3 hours.

serverTimePersistent=0;
                // Persist Time (value 0-1)//
                // the actual server time is saved to storage. When next active,
                // the next server start will use the saved time value.

guaranteedUpdates=1;
                // Communication protocol used
                // with game server (use only number 1)

loginQueueConcurrentPlayers=5;
                // the number of players
                // concurrently processed during the login process. Should
                // prevent massive performance drop during connection when a lot
                // of people are connecting at the same time.
loginQueueMaxPlayers=500;
                // players that can wait in login queue

instanceId = 1;
                // DayZ server instance id, to
                // identify the number of instances per box and their storage
                // folders with persistence files

storageAutoFix = 1;
                // Checks if the persistence files
                // are corrupted and replaces corrupted ones with empty ones
                // (value 0-1)

mods=@VPPAdminTools;@VPPAdminToolsFix;

class Missions
{
    class DayZ
    {
        template="dayzOffline.skahal"; // Mission to load on
        server startup. <MissionName>.<TerrainName>
                // Vanilla mission:
        dayzOffline.chernarus​plus
                // DLC mission:
        dayzOffline.enoch
    };
};
